<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Organizador</title>
    <style>
        /* Paleta de Cores Extraída da Imagem */
        :root {
            --color-blue: #3A80E0;
            --color-dark-blue: #40399E;
            --color-pink: #E03AA4;
            --color-dusty: #AB6590;
            --color-charcoal: #343B45;
            --color-lilac: #B2A1CF;
            --color-periwinkle: #9898F5;
            --color-purple: #8E2BD9;
            --color-bg: #F8F9FB;
            --color-white: #FFFFFF;
            --color-text: #343B45;
            --color-gray: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--color-dark-blue), var(--color-purple));
            color: var(--color-white);
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            color: var(--color-lilac);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Formulário */
        .form-card {
            background: var(--color-white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            margin-top: -60px; /* Sobrepõe o header levemente */
            position: relative;
            border-top: 4px solid var(--color-pink);
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-dark-blue);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-dusty);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            padding: 12px 15px;
            border: 1px solid var(--color-gray);
            border-radius: 10px;
            font-size: 14px;
            color: var(--color-text);
            background-color: var(--color-bg);
            transition: all 0.3s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--color-periwinkle);
            box-shadow: 0 0 0 3px rgba(152, 152, 245, 0.2);
        }

        .time-inputs-wrapper {
            display: flex;
            gap: 10px;
        }

        .time-inputs-wrapper .time-field {
            flex: 1;
            display: flex;
            align-items: center;
            background-color: var(--color-bg);
            border: 1px solid var(--color-gray);
            border-radius: 10px;
            padding-right: 15px;
            transition: all 0.3s;
        }

        .time-inputs-wrapper .time-field:focus-within {
            border-color: var(--color-periwinkle);
            box-shadow: 0 0 0 3px rgba(152, 152, 245, 0.2);
        }

        .time-inputs-wrapper input {
            border: none;
            box-shadow: none;
            background: transparent;
            width: 100%;
        }

        .time-inputs-wrapper input:focus {
            box-shadow: none;
        }

        .time-inputs-wrapper span {
            font-size: 12px;
            color: var(--color-dusty);
            font-weight: 700;
        }

        .category-wrapper {
            display: flex;
            gap: 10px;
        }

        .category-wrapper select {
            flex: 1;
        }

        button.action-btn {
            background-color: var(--color-white);
            color: var(--color-charcoal);
            border: 1px solid var(--color-gray);
            border-radius: 10px;
            padding: 0 15px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button.action-btn:hover {
            background-color: var(--color-gray);
        }

        .btn-submit {
            background-color: var(--color-pink);
            color: var(--color-white);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
            box-shadow: 0 4px 10px rgba(224, 58, 164, 0.3);
        }

        .btn-submit:hover {
            background-color: #c72b8d;
        }

        /* Gestão de Categoria */
        .new-category-box {
            display: none;
            background-color: var(--color-bg);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px dashed var(--color-lilac);
        }

        .new-category-box.active {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .new-category-box input {
            flex: 1;
        }

        /* Listas e Accordion */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            padding: 10px 0;
            border-bottom: 2px solid var(--color-gray);
            margin-bottom: 15px;
            transition: opacity 0.2s;
        }
        
        .section-header:hover {
            opacity: 0.7;
        }

        .section-header .title-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 600;
            color: var(--color-charcoal);
        }

        .toggle-icon {
            font-size: 14px;
            color: var(--color-dusty);
            transition: transform 0.3s ease;
        }

        .toggle-icon.rotated {
            transform: rotate(-90deg);
        }

        .collapsed-list {
            display: none !important;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        /* Cards Refatorados para Mobile */
        .task-card {
            background: var(--color-white);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex;
            align-items: flex-start;
            flex-wrap: wrap; /* Permite que os blocos quebrem de linha se faltar espaço */
            gap: 15px;
            border-left: 5px solid var(--color-blue);
            transition: transform 0.2s;
        }

        .task-card:hover {
            transform: translateY(-2px);
        }

        .task-card.completed {
            border-left-color: var(--color-dusty);
            opacity: 0.7;
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: var(--color-dusty);
        }

        .checkbox-wrapper {
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid var(--color-periwinkle);
            border-radius: 6px;
            background-color: transparent;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }

        .checkbox-wrapper input[type="checkbox"]:checked {
            background-color: var(--color-periwinkle);
            border-color: var(--color-periwinkle);
        }

        .checkbox-wrapper input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-content {
            flex: 1;
            min-width: 180px; /* Garante que o texto não esprema até desaparecer */
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-dark-blue);
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* Estilo unificado para todas as etiquetas (data, hora, tempo) */
        .task-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            background-color: var(--color-bg);
            padding: 5px 10px;
            border-radius: 8px;
            color: var(--color-dusty);
            font-weight: 500;
            font-size: 12px;
        }

        .task-meta .badge {
            background-color: var(--color-periwinkle);
            color: var(--color-white);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .task-actions {
            display: flex;
            gap: 12px; /* Maior espaçamento entre os botões */
            flex-shrink: 0;
            align-items: center;
        }

        .icon-btn {
            background: var(--color-bg); /* Fundo sutil para definir a área de toque */
            border: none;
            cursor: pointer;
            color: var(--color-dusty);
            font-size: 16px;
            transition: 0.2s;
            width: 38px;  /* Área de toque maior */
            height: 38px; /* Área de toque maior */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-btn:hover {
            color: var(--color-charcoal);
            background-color: var(--color-gray);
        }
        
        .icon-btn.archive:hover {
            color: var(--color-blue);
            background-color: #e6f0fa;
        }

        .icon-btn.delete:hover {
            color: #d9534f;
            background-color: #fcebeb;
        }

        .badge-count {
            background-color: var(--color-bg);
            color: var(--color-dusty);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Modal Customizado de Confirmação */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: var(--color-white);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .modal-content h3 {
            color: var(--color-dark-blue);
            margin-bottom: 10px;
            font-size: 20px;
        }

        .modal-content p {
            color: var(--color-charcoal);
            margin-bottom: 25px;
            font-size: 15px;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
        }

        .btn-danger {
            background-color: #d9534f;
        }
        .btn-danger:hover {
            background-color: #c9302c;
        }
        .btn-archive {
            background-color: var(--color-blue);
        }
        .btn-archive:hover {
            background-color: #2b6ac4;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            font-weight: 600;
            color: var(--color-dark-blue);
            backdrop-filter: blur(2px);
        }

        .hidden {
            display: none !important;
        }

        /* Responsividade para Celulares */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .task-actions {
                width: 100%; /* Força os botões para a linha de baixo */
                justify-content: flex-end; /* Alinha à direita */
                padding-top: 15px;
                margin-top: 5px;
                border-top: 1px dashed var(--color-gray); /* Linha separadora visual */
            }
        }
    </style>
</head>
<body>

    <div id="loader">Carregando dados...</div>

    <!-- Modal Customizado (Substitui o confirm() do navegador) -->
    <div id="customModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modalTitle">Confirmação</h3>
            <p id="modalMessage">Você tem certeza?</p>
            <div class="modal-actions">
                <button class="action-btn" onclick="closeModal()">Cancelar</button>
                <button class="btn-submit" id="modalConfirmBtn" style="margin-top: 0;">Confirmar</button>
            </div>
        </div>
    </div>

    <header>
        <h1>Meu Organizador</h1>
        <p>Planeje seu dia com leveza e praticidade</p>
    </header>

    <div class="container">
        
        <!-- Formulário de Tarefa -->
        <div class="form-card">
            <div class="form-title">
                <span id="formActionTitle">Nova Tarefa</span>
                <!-- Botão de limpar formulário simplificado -->
                <button type="button" class="action-btn" onclick="clearForm()" style="padding: 5px 15px; font-size: 12px;">Limpar</button>
            </div>
            
            <form id="taskForm" onsubmit="submitTarefa(event)">
                <input type="hidden" id="tarefaId">
                
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label for="tarefa">O que precisa ser feito?</label>
                        <input type="text" id="tarefa" required placeholder="Ex: Estudar para a prova">
                    </div>

                    <div class="input-group">
                        <label for="categoria">Categoria</label>
                        <div class="category-wrapper">
                            <select id="categoria" required>
                                <option value="" disabled selected>Selecione...</option>
                            </select>
                            <button type="button" class="action-btn" onclick="toggleNewCategory()" title="Nova Categoria">+</button>
                            <button type="button" class="action-btn" onclick="removeCurrentCategory()" title="Desativar Categoria Selecionada">-</button>
                        </div>
                        
                        <div class="new-category-box" id="newCategoryBox">
                            <input type="text" id="novaCategoriaInput" placeholder="Nome da nova categoria">
                            <button type="button" class="action-btn" onclick="saveNewCategory()">Salvar</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="data">Data (Opcional)</label>
                        <input type="date" id="data">
                    </div>

                    <div class="input-group">
                        <label for="horario">Horário (Opcional)</label>
                        <input type="time" id="horario">
                    </div>

                    <div class="input-group">
                        <label>Tempo Estimado (Opcional)</label>
                        <div class="time-inputs-wrapper">
                            <div class="time-field">
                                <input type="number" id="tempoHoras" min="0" placeholder="0">
                                <span>H</span>
                            </div>
                            <div class="time-field">
                                <input type="number" id="tempoMinutos" min="0" max="59" placeholder="0">
                                <span>MIN</span>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">Salvar Tarefa</button>
            </form>
        </div>

        <!-- Tarefas Pendentes -->
        <div class="section-header" onclick="toggleSection('listaPendentes', this)">
            <div class="title-area">
                Pendentes
                <span class="badge-count" id="countPendentes">0</span>
            </div>
            <span class="toggle-icon">▼</span>
        </div>
        <div class="task-list" id="listaPendentes">
            <!-- Cards injetados via JS -->
        </div>

        <!-- Tarefas Concluídas -->
        <div class="section-header" onclick="toggleSection('listaConcluidas', this)">
            <div class="title-area">
                Concluídas
                <span class="badge-count" id="countConcluidas">0</span>
            </div>
            <span class="toggle-icon rotated">▼</span>
        </div>
        <div class="task-list collapsed-list" id="listaConcluidas">
            <!-- Cards injetados via JS -->
        </div>

    </div>

    <script>
        // =========================================================
        // URL DO GOOGLE APPS SCRIPT ATUALIZADA
        // =========================================================
        const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBDmm4skxObab4KsC1NgKpSqnV9hCH-_-tGKyXy8J2s32OpRcElmlzd5R9RTfQxIlByw/exec'; 

        // Estado local
        let state = {
            tarefas: [],
            categorias: []
        };

        // ==========================================
        // SISTEMA DE MODAL (Substitui o Confirm bloqueado por celulares/iframes)
        // ==========================================
        let modalCallback = null;

        function showModal(title, message, btnText, btnClass, callback) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.textContent = btnText;
            confirmBtn.className = 'btn-submit ' + btnClass;
            
            modalCallback = callback;
            document.getElementById('customModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('customModal').classList.add('hidden');
            modalCallback = null;
        }

        document.getElementById('modalConfirmBtn').addEventListener('click', () => {
            if (modalCallback) modalCallback();
            closeModal();
        });


        // ==========================================
        // COMUNICAÇÃO COM O BACKEND
        // ==========================================

        async function fetchAPI(payload) {
            showLoader(true);
            try {
                const response = await fetch(APP_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if(result.status === 'error') {
                    showModal('Erro', result.message, 'OK', '', () => {});
                    console.error(result.message);
                }
                
                showLoader(false);
                return result.data;
            } catch (error) {
                showLoader(false);
                showModal('Erro de Conexão', 'Não foi possível conectar. Tente novamente.', 'OK', '', () => {});
                console.error(error);
            }
        }

        // ==========================================
        // INICIALIZAÇÃO
        // ==========================================

        window.onload = async () => {
            await loadData();
        };

        async function loadData() {
            const data = await fetchAPI({ action: 'getInitData' });
            if (data) {
                state.tarefas = data.tarefas;
                state.categorias = data.categorias;
                renderCategorias();
                renderTarefas();
            }
        }

        // ==========================================
        // RENDERIZAÇÃO DA UI
        // ==========================================

        function renderCategorias() {
            const select = document.getElementById('categoria');
            const currentValue = select.value;
            
            select.innerHTML = '<option value="" disabled selected>Selecione...</option>';
            state.categorias.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });

            if (currentValue && state.categorias.includes(currentValue)) {
                select.value = currentValue;
            }
        }

        function renderTarefas() {
            const listPendentes = document.getElementById('listaPendentes');
            const listConcluidas = document.getElementById('listaConcluidas');
            
            listPendentes.innerHTML = '';
            listConcluidas.innerHTML = '';
            
            let pendentesCount = 0;
            let concluidasCount = 0;

            state.tarefas.forEach(t => {
                const card = document.createElement('div');
                card.className = `task-card ${t.concluida ? 'completed' : ''}`;
                
                let dataDisplay = '';
                if(t.data) {
                    const [y, m, d] = t.data.split('-');
                    dataDisplay = `<span>📅 ${d}/${m}</span>`;
                }

                // Higienização da string ISO gerada pelo epoch time do Google Sheets
                let horaDisplay = '';
                if (t.horario) {
                    let horaLimpa = t.horario;
                    if (typeof t.horario === 'string' && t.horario.includes('T')) {
                        const match = t.horario.match(/T(\d{2}:\d{2})/);
                        if (match) horaLimpa = match[1];
                    }
                    horaDisplay = `<span>⏰ ${horaLimpa}</span>`;
                }

                // Formatação do tempo em Total de Minutos para formato visual (Xh Ym)
                let tempoDisplay = '';
                if (t.tempo) {
                    let totalMinutos = parseInt(t.tempo);
                    if (!isNaN(totalMinutos) && totalMinutos > 0) {
                        const h = Math.floor(totalMinutos / 60);
                        const m = totalMinutos % 60;
                        let textTempo = [];
                        if (h > 0) textTempo.push(`${h}h`);
                        if (m > 0) textTempo.push(`${m}m`);
                        tempoDisplay = `<span>⏳ ${textTempo.join(' ')}</span>`;
                    } else if (isNaN(totalMinutos) && typeof t.tempo === 'string') {
                        // Compatibilidade com dados antigos que já estavam como texto livre
                        tempoDisplay = `<span>⏳ ${t.tempo}</span>`;
                    }
                }

                card.innerHTML = `
                    <div class="checkbox-wrapper">
                        <input type="checkbox" ${t.concluida ? 'checked' : ''} onchange="toggleStatus('${t.id}', this.checked)">
                    </div>
                    <div class="task-content">
                        <div class="task-title">${t.tarefa}</div>
                        <div class="task-meta">
                            <span class="badge">${t.categoria}</span>
                            ${dataDisplay}
                            ${horaDisplay}
                            ${tempoDisplay}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="icon-btn" onclick="editTarefa('${t.id}')" title="Editar">✎</button>
                        <button class="icon-btn archive" onclick="archiveTarefa('${t.id}')" title="Arquivar">📦</button>
                        <button class="icon-btn delete" onclick="deleteTarefa('${t.id}')" title="Excluir">🗑</button>
                    </div>
                `;

                if (t.concluida) {
                    listConcluidas.appendChild(card);
                    concluidasCount++;
                } else {
                    listPendentes.appendChild(card);
                    pendentesCount++;
                }
            });

            if(pendentesCount === 0) listPendentes.innerHTML = '<p style="color: var(--color-lilac); font-size: 14px;">Nenhuma tarefa pendente.</p>';
            if(concluidasCount === 0) listConcluidas.innerHTML = '<p style="color: var(--color-lilac); font-size: 14px;">Nenhuma tarefa concluída.</p>';

            document.getElementById('countPendentes').textContent = pendentesCount;
            document.getElementById('countConcluidas').textContent = concluidasCount;
        }

        // Função para manipulação de estado do Accordion
        function toggleSection(listId, headerElement) {
            const list = document.getElementById(listId);
            const icon = headerElement.querySelector('.toggle-icon');
            
            list.classList.toggle('collapsed-list');
            icon.classList.toggle('rotated');
        }

        // ==========================================
        // LÓGICA DE TAREFAS
        // ==========================================

        async function submitTarefa(e) {
            e.preventDefault();
            
            const id = document.getElementById('tarefaId').value;
            
            // Tratamento do Tempo Estimado (Soma as horas e minutos num total inteiro)
            const inputHoras = parseInt(document.getElementById('tempoHoras').value) || 0;
            const inputMinutos = parseInt(document.getElementById('tempoMinutos').value) || 0;
            const totalMinutos = (inputHoras * 60) + inputMinutos;

            const dataObj = {
                tarefa: document.getElementById('tarefa').value,
                categoria: document.getElementById('categoria').value,
                data: document.getElementById('data').value,
                horario: document.getElementById('horario').value,
                tempo: totalMinutos > 0 ? totalMinutos : "" // Salva em minutos para o dashboard
            };

            if (id) {
                await fetchAPI({ action: 'updateTarefa', data: { id, ...dataObj } });
                const index = state.tarefas.findIndex(t => t.id === id);
                state.tarefas[index] = { ...state.tarefas[index], ...dataObj };
            } else {
                const res = await fetchAPI({ action: 'addTarefa', data: dataObj });
                if(res) {
                    state.tarefas.push({ id: res.id, concluida: false, ...dataObj });
                }
            }

            clearForm();
            renderTarefas();
        }

        function editTarefa(id) {
            const t = state.tarefas.find(x => x.id === id);
            if (!t) return;

            document.getElementById('tarefaId').value = t.id;
            document.getElementById('tarefa').value = t.tarefa;
            document.getElementById('data').value = t.data;
            document.getElementById('horario').value = t.horario;
            
            // Preenche os campos de Hora e Minuto baseado no total salvo
            if (t.tempo && !isNaN(parseInt(t.tempo))) {
                document.getElementById('tempoHoras').value = Math.floor(t.tempo / 60) || '';
                document.getElementById('tempoMinutos').value = t.tempo % 60 || '';
            } else {
                document.getElementById('tempoHoras').value = '';
                document.getElementById('tempoMinutos').value = '';
            }
            
            const select = document.getElementById('categoria');
            if (!state.categorias.includes(t.categoria)) {
                const option = document.createElement('option');
                option.value = t.categoria;
                option.textContent = t.categoria + ' (Inativa)';
                select.appendChild(option);
            }
            select.value = t.categoria;

            document.getElementById('formActionTitle').textContent = "Editar Tarefa";
            document.getElementById('btnSubmit').textContent = "Atualizar Tarefa";
            document.getElementById('tarefa').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function toggleStatus(id, isChecked) {
            const index = state.tarefas.findIndex(t => t.id === id);
            state.tarefas[index].concluida = isChecked;
            renderTarefas(); 
            await fetchAPI({ action: 'toggleConcluida', id: id, status: isChecked });
        }

        // ==========================================
        // MIGRAÇÃO DE DADOS (ARQUIVO E LIXEIRA) COM MODAL
        // ==========================================

        function archiveTarefa(id) {
            showModal(
                "Arquivar Tarefa", 
                "A tarefa sairá da lista e irá para a aba Arquivadas. Continuar?", 
                "Arquivar", 
                "btn-archive",
                async () => {
                    // UI Update Otimista
                    state.tarefas = state.tarefas.filter(t => t.id !== id);
                    renderTarefas();
                    // Execução Backend
                    await fetchAPI({ action: 'archiveTarefa', id: id });
                }
            );
        }

        function deleteTarefa(id) {
            showModal(
                "Excluir Tarefa", 
                "Enviar esta tarefa para a Lixeira? Ela será deletada após 30 dias.", 
                "Sim, excluir", 
                "btn-danger",
                async () => {
                    // UI Update Otimista
                    state.tarefas = state.tarefas.filter(t => t.id !== id);
                    renderTarefas();
                    // Execução Backend
                    await fetchAPI({ action: 'deleteTarefa', id: id });
                }
            );
        }

        function clearForm() {
            document.getElementById('taskForm').reset();
            document.getElementById('tarefaId').value = '';
            document.getElementById('tempoHoras').value = '';
            document.getElementById('tempoMinutos').value = '';
            document.getElementById('formActionTitle').textContent = "Nova Tarefa";
            document.getElementById('btnSubmit').textContent = "Salvar Tarefa";
        }

        // ==========================================
        // LÓGICA DE CATEGORIAS
        // ==========================================

        function toggleNewCategory() {
            const box = document.getElementById('newCategoryBox');
            box.classList.toggle('active');
            if(box.classList.contains('active')) document.getElementById('novaCategoriaInput').focus();
        }

        async function saveNewCategory() {
            const input = document.getElementById('novaCategoriaInput');
            const nome = input.value.trim();
            
            if (!nome) return;

            await fetchAPI({ action: 'addCategoria', nome: nome });
            
            if (!state.categorias.includes(nome)) {
                state.categorias.push(nome);
            }
            
            renderCategorias();
            document.getElementById('categoria').value = nome;
            input.value = '';
            toggleNewCategory();
        }

        function removeCurrentCategory() {
            const select = document.getElementById('categoria');
            const nome = select.value;
            
            if(!nome) {
                showModal("Aviso", "Selecione uma categoria para desativar.", "Entendi", "", () => {});
                return;
            }

            showModal(
                "Desativar Categoria", 
                `Desativar a categoria "${nome}"? Tarefas antigas não serão afetadas.`, 
                "Sim, desativar", 
                "btn-danger",
                async () => {
                    await fetchAPI({ action: 'desativarCategoria', nome: nome });
                    state.categorias = state.categorias.filter(c => c !== nome);
                    renderCategorias();
                }
            );
        }

        function showLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

    </script>
</body>
</html>
